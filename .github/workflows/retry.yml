name: OCI ARM Instance Retry

on:
  schedule:
    - cron: '*/10 * * * *'  # 10분마다 실행
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Restore Terraform state
        uses: actions/cache@v4
        with:
          path: terraform.tfstate
          key: terraform-state

      - name: Write OCI private key
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Write tfvars
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          SSH_KEY_ONELINE=$(echo "$SSH_PUBLIC_KEY" | tr -d '\n')
          printf 'tenancy_ocid     = "%s"\n' "$OCI_TENANCY_OCID" > terraform.tfvars
          printf 'user_ocid        = "%s"\n' "$OCI_USER_OCID" >> terraform.tfvars
          printf 'fingerprint      = "%s"\n' "$OCI_FINGERPRINT" >> terraform.tfvars
          printf 'private_key_path = "~/.oci/oci_api_key.pem"\n' >> terraform.tfvars
          printf 'region           = "ap-chuncheon-1"\n' >> terraform.tfvars
          printf 'compartment_ocid = "%s"\n' "$OCI_COMPARTMENT_OCID" >> terraform.tfvars
          printf 'ssh_public_key   = "%s"\n' "$SSH_KEY_ONELINE" >> terraform.tfvars

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve
        continue-on-error: true

      - name: Save Terraform state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: terraform.tfstate
          key: terraform-state-${{ github.run_id }}

      - name: 성공 시 워크플로우 비활성화
        if: steps.apply.outcome == 'success'
        run: |
          curl -X PUT \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/retry.yml/disable
